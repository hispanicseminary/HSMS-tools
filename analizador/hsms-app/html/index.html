function getSelectionHtml() {
    var html = "";
    if (typeof window.getSelection != "undefined") {
        var sel = window.getSelection();
        if (sel.rangeCount) {
            var container = document.createElement("div");
            for (var i = 0, len = sel.rangeCount; i < len; ++i) {
                container.appendChild(sel.getRangeAt(i).cloneContents());
            }
            html = container.innerHTML;
        }
    } else if (typeof document.selection != "undefined") {
        if (document.selection.type == "Text") {
            html = document.selection.createRange().htmlText;
        }
    }
    return(html);
}

function replaceSelectionWithHtml() {
    var range, html;
	html = getSelectionHtml();
	html = '<div style="display: inline; background-color: yellow">' + html + '</div>';
    if (window.getSelection && window.getSelection().getRangeAt) {
        range = window.getSelection().getRangeAt(0);
        range.deleteContents();
        var div = document.createElement("div");
        div.innerHTML = html;
        var frag = document.createDocumentFragment(), child;
        while ( (child = div.firstChild) ) {
            frag.appendChild(child);
        }
        range.insertNode(frag);
    } else if (document.selection && document.selection.createRange) {
        range = document.selection.createRange();
        range.pasteHTML(html);
    }
}

  return str.replace(/[\-\[\]\/\{\}\(\)\*\+\?\.\\\^\$\|]/g, "\\$&");
}

function addentry() {

	var hsmsperl = nwDir.replace(/\\/g, "/");
	hsmsperl = nwDir.replace(/[\\\/]node-webkit/, "");

	var forma = $("#forma").val();
	var normalizada = $("#norma").val();
	var lema = $("#lema").val();
	var pos = $("#pos").val();
	var otros = $("#otros").val();
	var action = $("#guardar").text();

	if (otros) {
		otros = otros.trim();
		otros = otros.replace(/\n/g, "@");
		otros = otros.replace(/•/g, "@");
		
	}
	else {
		otros = "XXX";
	}

	if (!forma) {alert("La caja «Forma» está vacía");}
	else if (!lema) {alert("La caja «Lema»");}
	else if (!pos) {alert("La caja «Etiqueta» está vacía");}
	else {

		if (forma.match(/ /)) {forma = forma.replace(/ +/g, "_");}
		if (forma.match(/˽/)) {forma = forma.replace(/˽/g, "_");}
		if (forma.match(/[\"“]/)) {forma = forma.replace(/[\"“]/g, "”");}
		if (forma.match(/[\'‘]/)) {forma = forma.replace(/[\'‘]/g, "’");}
		if (lema.match(/ /)) {lema = lema.replace(/ +/g, "_");}
		if (lema.match(/˽/)) {lema = lema.replace(/˽/g, "_");}
		if (lema.match(/[\"“]/)) {lema = lema.replace(/[\"“]/g, "”");}
		if (lema.match(/[\'‘]/)) {lema = lema.replace(/[\'‘]/g, "’");}
		if (otros.match(/ /)) {otros = otros.replace(/ +/g, "_");}
		if (otros.match(/˽/)) {otros = otros.replace(/˽/g, "_");}
		if (otros.match(/[\"“]/)) {otros = otros.replace(/[\"“]/g, "”");}
		if (otros.match(/[\'‘]/)) {otros = otros.replace(/[\'‘]/g, "’");}
		if (otros.match(/€/)) {otros = otros.replace(/€/g, "•");}
	
		var myAddition = forma + " " + normalizada + " " + lema + " " + pos + " " + otros + " " + action;
 
		myAddition = myAddition.replace(/ƽ/g, "xsigmazx");
		myAddition = myAddition.replace(/Ƽ/g, "xSigmazx");
		//myAddition = myAddition.replace(/ζ/g, "xsigmazx");
		//myAddition = myAddition.replace(/Ζ/g, "xSigmazx");
		myAddition = myAddition.replace(/σ/g, "xsigmasx");
		myAddition = myAddition.replace(/Σ/g, "xSigmasx");
		myAddition = myAddition.replace(/ς/g, "xsigmacx");
		myAddition = myAddition.replace(/∑/g, "xSigmacx");

		var execSync = require('child_process').execSync;

		///////////////// COMPILADO WIN /////////////////
		var child = execSync("\"" + hsmsperl + "/dicc-hsms.exe" + "\" " + encodeURIComponent(myAddition) + '\"');
		///////////////// LINUX /////////////////
		//var child = execSync(hsmsperl + '/dicc-hsms.pl \"' + encodeURIComponent(myAddition) + '\"');
		///////////////// WIN /////////////////
		//var child = execSync("C:/Users/Javier/Desktop/perl/bin/perl.exe " + hsmsperl + '/dicc-hsms.pl \"' + encodeURIComponent(myAddition) + '\"');
		
		alert("Entrada modificada");
	}
}


var container = document.getElementById('content');
var warning = document.getElementById('warning');
var input = document.getElementById('find');
//var colors = ['yellow', 'green', 'blue', 'purple', '#E67A00', 'red'];
var colors = ['#ADD8E6']; // var colors = ['yellow'];
var instance;
var inputHandler = function() {
	instance && instance.revert();
	warning.style.display = 'none';
	if (input.value) {
		var called = false;
		try {
			var regex = RegExp(input.value, 'gi');
		} catch(e) {
			warning.innerHTML = 'INVALID REGEX ಠ_ಠ';
			warning.style.display = 'inline';
			return;
		}
		try {
			instance = findAndReplaceDOMText(container, {
				portionMode: 'first',
				find: regex,
				wrap: 'match',
				forceContext: findAndReplaceDOMText.NON_INLINE_PROSE
			});
		} catch(e) {
			warning.innerHTML = 'Error: ' + e;
			warning.style.display = 'inline';
			throw e;
			return;
		}
		if (!called) {
			//warning.innerHTML = 'Sin resultados :(';
			warning.style.display = 'inline';
		}
	}
};


function scrollToPosition(element) {
    if (element !== undefined) {
        $("#content").scrollTo(element, 200, {
            margin: true, offset: -10
        });
    }
}

var position = 0;
var buscar = $('#buscar');
var limpiar_buscar = $('#limpiar_buscar');
var next = $('#next');
var prev = $('#prev');
next.prop( "disabled", true );
prev.prop( "disabled", true );
var tokens = 0;
var mi_match_element;

limpiar_buscar.click(function(evt) {
	$('#find').val('');
	$('#buscar').click();
	$('#prev_desambiguar').prop( "disabled", true );
	$('#next_desambiguar').prop( "disabled", true);
});

buscar.click(function(evt) {
	inputHandler();
	position = -1;
	tokens = $('match').length;
	next.click();
	if  (tokens === 0) {next.prop( "disabled", true); prev.prop( "disabled", true); $("#ocurrencias").html(""); warning.innerHTML = 'Sin resultados :(';}
	else if  (tokens === 1) {
	    warning.innerHTML = '';
		next.prop( "disabled", true);
		prev.prop( "disabled", true);
		//$($('match')[0]).parent().click();
		$("#ocurrencias").html("<span>1 de " + tokens + " ocurrencias</span>");
		$($('match')).removeClass('borderClass');
		$($('match')[0]).addClass('borderClass');
	}
	else {next.prop( "disabled", false );  prev.prop( "disabled", true); $("#ocurrencias").html("<span>1 de " + tokens + " ocurrencias</span>"); warning.innerHTML = '';}
});


next.click(function(evt) {
	prev.prop( "disabled", false );
	scrollToPosition($($('match')[position += 1]));
	var fakeposition = position + 1;
	//$($('match')[position]).parent().click();
	$("#ocurrencias").html(fakeposition + " de <span>" + tokens + " ocurrencias</span>");
	$($('match')).removeClass('borderClass');
	$($('match')[position]).addClass('borderClass');
	if (position === $('match').length - 1) {
		next.prop( "disabled", true );
	}
});

prev.click(function(evt) {
	next.prop( "disabled", false );
	scrollToPosition($($('match')[position -= 1]));
	var fakeposition = position + 1;
	//$($('match')[position]).parent().click();
	$("#ocurrencias").html(fakeposition + " de <span>" + tokens + " ocurrencias</span>");
	$($('match')).removeClass('borderClass');
	$($('match')[position]).addClass('borderClass');
	if (fakeposition === 1) {
		prev.prop( "disabled", true );
	}
});
